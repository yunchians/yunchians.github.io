<!DOCTYPE html>
<html class="page1">

<head>
    <title>KU-Thông qua mã QR để thêm bạn trên Zalo-1 - KU CASINO | KUBET</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://necolas.github.io/normalize.css/8.0.1/normalize.css">
    <link rel="stylesheet" href="style/main.css">
    <link rel="icon" type="image/png" href="images/favorite.png" />
</head>

<body>
    <div class="page-wrapper">
        <div class="logo-block">
            <img src="images/ku-logo.png">
        </div>
        <div class="btn-block">
            <a href="javascript:void(0)" class="register-btn" onclick="openOfficialURL()">
            </a>
        </div>
        <div class="qrcode-block">
            <a href="javascript:void(0)" onclick="openQRcodeURL()">
                <img src="images/qrcode.jpg" class="qrcode-img">
            </a>
        </div>
        <div class="text-block">
            <p id="blink">Quét mã QR để nhận Khuyến Mãi</p>
            <ol>
                <li>Nhận 128k chơi thử</li>
                <li>Nạp 1000k tặng 300k</li>
            </ol>
        </div>
    </div>
    <div class="conin1">
        <img src="images/coin1.png">
    </div>
    <div class="conin2">
        <img src="images/coin2.png">
    </div>
    <script src="js/setting.js"></script>
    <script>
        function changeColor() {
            var color = "#ff0000|#ffff01";
            color = color.split("|");
            document.getElementById("blink").style.color = color[parseInt(Math.random() * color.length)];
        }
        setInterval("changeColor()", 200);
    </script>
</body>

</html>
