<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>天氣及時預報</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js"></script>
</head>

<body>
    <div class="wrapper">
        <div class="title">台中市一周天氣預報</div>
        <table class="datablock">
            <tr>
                <th colspan="2">日期</th>
                <th colspan="2">天氣</th>
                <th>溫度</th>
                <th>濕度</th>
                <th>降雨</th>
            </tr>
            <tr>
                <td rowspan="2">12/26</td>
                <td>早上</td>
                <td>圖</td>
                <td>多雲</td>
                <td>30度</td>
                <td>20%</td>
                <td>20%</td>
            </tr>
            <tr>
                <td>晚上</td>
                <td>圖</td>
                <td>晴</td>
                <td>25度</td>
                <td>40%</td>
                <td>40%</td>
            </tr>
        </table>
    </div>
</body>

</html>
